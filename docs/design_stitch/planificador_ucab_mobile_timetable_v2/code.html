<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Horarios UCAB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(240, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(210, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(240, 100%, 95%, 1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
<!-- Header -->
<header class="glass-header sticky top-0 z-50 flex items-center justify-between p-4 pb-3">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 active:bg-black/10 transition-colors">
<span class="material-symbols-outlined text-slate-800">menu</span>
</button>
<h1 class="text-xl font-bold tracking-tight flex-1 text-center pr-10 text-slate-800">Horarios UCAB</h1>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col gap-6 p-4 pb-24">
<!-- Day Section: Lunes -->
<section class="flex flex-col gap-3">
<h2 class="text-lg font-bold sticky top-[60px] z-40 py-2 bg-gradient-to-b from-[rgba(248,250,252,0.9)] to-transparent backdrop-blur-sm -mx-4 px-4 text-slate-800">Lunes</h2>
<!-- Course Card 1 -->
<div class="glass-card rounded-[16px] p-4 relative overflow-hidden flex gap-4">
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary/80"></div>
<div class="flex flex-col justify-between items-center py-1 w-16 shrink-0 border-r border-slate-200/50 pr-4">
<span class="text-xs font-semibold text-slate-500">07:00</span>
<span class="text-[10px] text-slate-400">AM</span>
<div class="h-4 w-px bg-slate-200/50 my-1"></div>
<span class="text-[10px] text-slate-400">AM</span>
<span class="text-xs font-semibold text-slate-500">09:00</span>
</div>
<div class="flex flex-col justify-center flex-1">
<h3 class="font-bold text-slate-800 leading-tight mb-1">Programación Orientada a Objetos</h3>
<div class="flex items-center gap-1.5 mt-2">
<span class="material-symbols-outlined text-[16px] text-primary/70">location_on</span>
<span class="text-sm font-medium text-slate-600">Aul 42</span>
</div>
</div>
</div>
<!-- Course Card 2 -->
<div class="glass-card rounded-[16px] p-4 relative overflow-hidden flex gap-4">
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-emerald-500/80"></div>
<div class="flex flex-col justify-between items-center py-1 w-16 shrink-0 border-r border-slate-200/50 pr-4">
<span class="text-xs font-semibold text-slate-500">10:00</span>
<span class="text-[10px] text-slate-400">AM</span>
<div class="h-4 w-px bg-slate-200/50 my-1"></div>
<span class="text-[10px] text-slate-400">PM</span>
<span class="text-xs font-semibold text-slate-500">12:00</span>
</div>
<div class="flex flex-col justify-center flex-1">
<h3 class="font-bold text-slate-800 leading-tight mb-1">Matemáticas Discretas</h3>
<div class="flex items-center gap-1.5 mt-2">
<span class="material-symbols-outlined text-[16px] text-emerald-600/70">location_on</span>
<span class="text-sm font-medium text-slate-600">Aul 12</span>
</div>
</div>
</div>
</section>
<!-- Day Section: Martes -->
<section class="flex flex-col gap-3">
<h2 class="text-lg font-bold sticky top-[60px] z-40 py-2 bg-gradient-to-b from-[rgba(248,250,252,0.9)] to-transparent backdrop-blur-sm -mx-4 px-4 text-slate-800">Martes</h2>
<!-- Course Card 3 -->
<div class="glass-card rounded-[16px] p-4 relative overflow-hidden flex gap-4">
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-violet-500/80"></div>
<div class="flex flex-col justify-between items-center py-1 w-16 shrink-0 border-r border-slate-200/50 pr-4">
<span class="text-xs font-semibold text-slate-500">08:00</span>
<span class="text-[10px] text-slate-400">AM</span>
<div class="h-4 w-px bg-slate-200/50 my-1"></div>
<span class="text-[10px] text-slate-400">AM</span>
<span class="text-xs font-semibold text-slate-500">10:00</span>
</div>
<div class="flex flex-col justify-center flex-1">
<h3 class="font-bold text-slate-800 leading-tight mb-1">Ingeniería de Software</h3>
<div class="flex items-center gap-1.5 mt-2">
<span class="material-symbols-outlined text-[16px] text-violet-600/70">location_on</span>
<span class="text-sm font-medium text-slate-600">Lab 3</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="glass-nav fixed bottom-0 left-0 right-0 z-50 rounded-t-[24px] shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
<!-- Draggable Handle Hint -->
<div class="w-full flex justify-center pt-2 pb-1">
<div class="w-10 h-1 rounded-full bg-slate-300"></div>
</div>
<div class="flex px-2 pb-6 pt-2 justify-around items-end">
<a class="flex flex-col items-center gap-1 p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">book</span>
<span class="text-[10px] font-medium tracking-wide">Materias</span>
</a>
<a class="flex flex-col items-center gap-1 relative -top-4" href="#">
<div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-[28px]">magic_button</span>
</div>
<span class="text-[10px] font-bold text-primary tracking-wide">Generar</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[28px]">favorite</span>
<span class="text-[10px] font-medium tracking-wide">Favoritos</span>
</a>
</div>
</nav>
</body></html>
