<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Share URL Service</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .test-section h3 { margin-bottom: 15px; }
    .result-box { background: #f8f9fa; padding: 15px; border-radius: 4px; font-family: monospace; word-break: break-all; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Test - Share URL Service</h1>
  
  <div class="test-section">
    <h3>1. Generar URL desde Estado</h3>
    <button id="btn-generate" class="btn btn-primary">Generar URL</button>
    <div id="result-generate" class="result-box mt-3" style="display:none;"></div>
  </div>
  
  <div class="test-section">
    <h3>2. Copiar URL al Portapapeles</h3>
    <input type="text" id="url-input" class="form-control mb-2" placeholder="Pega la URL aquí">
    <button id="btn-copy" class="btn btn-secondary">Copiar al Portapapeles</button>
    <div id="result-copy" class="result-box mt-3" style="display:none;"></div>
  </div>
  
  <div class="test-section">
    <h3>3. Generar QR Code</h3>
    <input type="text" id="qr-url-input" class="form-control mb-2" placeholder="URL para QR">
    <button id="btn-qr" class="btn btn-dark">Generar QR</button>
    <div id="result-qr" class="mt-3 text-center"></div>
  </div>
  
  <div class="test-section">
    <h3>4. Simular URL Compartida</h3>
    <button id="btn-simulate" class="btn btn-warning">Simular URL con parámetros</button>
    <div id="result-simulate" class="result-box mt-3" style="display:none;"></div>
  </div>

  <script type="module">
    import ShareService from './js/services/ShareService.js';
    
    const mockState = {
      selectedItems: [
        { subjectId: 'MAT101', selectionType: 'priority' },
        { subjectId: 'FIS201', selectionType: 'candidate' }
      ],
      onlyOpenSections: true,
      selectedCampus: 'gz'
    };
    
    document.getElementById('btn-generate').addEventListener('click', () => {
      const url = ShareService.generateShareUrl(mockState);
      const resultEl = document.getElementById('result-generate');
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<strong>URL Generada:</strong><br>${url}`;
      
      document.getElementById('url-input').value = url;
      document.getElementById('qr-url-input').value = url;
    });
    
    document.getElementById('btn-copy').addEventListener('click', async () => {
      const url = document.getElementById('url-input').value;
      const resultEl = document.getElementById('result-copy');
      
      if (!url) {
        resultEl.style.display = 'block';
        resultEl.innerHTML = '<span class="error">Ingresa una URL primero</span>';
        return;
      }
      
      const copied = await ShareService.copyToClipboard(url);
      resultEl.style.display = 'block';
      
      if (copied) {
        resultEl.innerHTML = '<span class="success">✓ URL copiada al portapapeles</span>';
      } else {
        resultEl.innerHTML = '<span class="error">✗ Error al copiar</span>';
      }
    });
    
    document.getElementById('btn-qr').addEventListener('click', async () => {
      const url = document.getElementById('qr-url-input').value;
      const resultEl = document.getElementById('result-qr');
      
      if (!url) {
        resultEl.innerHTML = '<span class="error">Ingresa una URL primero</span>';
        return;
      }
      
      resultEl.innerHTML = 'Generando...';
      
      try {
        const canvas = await ShareService.generateQrCode(url, 200);
        resultEl.innerHTML = '';
        resultEl.appendChild(canvas);
      } catch (error) {
        resultEl.innerHTML = `<span class="error">Error: ${error.message}</span>`;
      }
    });
    
    document.getElementById('btn-simulate').addEventListener('click', () => {
      const url = ShareService.generateShareUrl(mockState);
      
      const resultEl = document.getElementById('result-simulate');
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<strong>URL simulada:</strong><br>${url}<br><br>`;
      
      const separator = url.includes('?') ? '&' : '?';
      const simulatedUrl = url + separator + 'test=1';
      window.history.pushState({}, '', simulatedUrl);
      
      const decoded = ShareService.decodeFromUrl();
      resultEl.innerHTML += `<strong>Decodificado:</strong><br>${JSON.stringify(decoded, null, 2)}`;
      
      ShareService.cleanUrl();
      resultEl.innerHTML += `<br><br><span class="success">URL limpiada (parámetros eliminados)</span>`;
    });
    
    console.log('ShareService loaded:', ShareService);
  </script>
</body>
</html>
